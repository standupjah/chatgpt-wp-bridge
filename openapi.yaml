openapi: 3.1.0
info:
  title: ChatGPT WordPress Publishing Bridge
  version: 1.2.1
servers:
  - url: https://your-bridge.example.com

paths:
  /publish:
    post:
      operationId: publishPage
      summary: Publish HTML content to WordPress
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - html
              properties:
                title:
                  type: string
                  description: Title of the WordPress post or page.
                html:
                  type: string
                  description: HTML content to publish.
                status:
                  type: string
                  enum:
                    - draft
                    - publish
                    - private
                  default: draft
                content_type:
                  type: string
                  enum:
                    - page
                    - post
                  default: page
                slug:
                  type: string
                excerpt:
                  type: string
      responses:
        "200":
          description: Publish result

  /publish_transcript:
    post:
      operationId: publishTranscript
      summary: Publish a conversation transcript to WordPress
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - messages
              properties:
                title:
                  type: string
                  description: Title of the transcript post or page.
                status:
                  type: string
                  enum:
                    - draft
                    - publish
                    - private
                  default: draft
                content_type:
                  type: string
                  enum:
                    - page
                    - post
                  default: page
                slug:
                  type: string
                intro:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      content:
                        type: string
      responses:
        "200":
          description: Publish transcript result

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      x-openai-isConsequential: false
      responses:
        "200":
          description: OK
